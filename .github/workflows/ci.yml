name: CI

on:
  push:
    branches: [dev, production, main, master]
  pull_request:
    branches: [production, main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Node test
        run: npm test --if-present

      - name: Node build
        run: npm run build --if-present

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go test
        working-directory: backend
        run: go test ./...

      - name: Go build
        working-directory: backend
        run: go build ./...
